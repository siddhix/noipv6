name: OpenWrt Builder

permissions:
  actions: write       # 允许取消/删除 workflow runs
  contents: read       # 允许 checkout 代码
  pull-requests: read  # 可选

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    # 1. Checkout 源码
    - name: Checkout
      uses: actions/checkout@v4

    # 2. 缓存 SDK 和 feeds
    - name: Cache SDK and feeds
      uses: actions/cache@v4
      with:
        path: |
          ./dl
          ./feeds
          ./staging_dir
        key: ${{ runner.os }}-openwrt-${{ hashFiles('**/feeds.conf.default') }}

    # 3. 系统环境
    - name: Setup environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install build-essential ccache curl git python3 python3-setuptools squashfs-tools unzip vim wget zlib1g-dev gawk gettext libncurses5-dev libncursesw5-dev libssl-dev
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /mnt/workdir
        sudo chown $USER:$GROUPS /mnt/workdir

    # 4. Clone源码
    - name: Clone source code
      working-directory: /mnt/workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /mnt/workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # 5. 加载自定义 feeds & DIY 脚本1
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    # 6. 更新 & 安装 feeds
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # 7. 加载自定义配置 & DIY 脚本2
    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # 8. 下载依赖包
    - name: Download packages
      run: |
        cd openwrt
        make defconfig
        make download -j8

    # 9. 编译固件
    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) V=s

    # 10. 清理旧构建，减少空间占用
    - name: Clean old builds
      run: |
        cd openwrt
        rm -rf tmp

    # 11. 整理固件目录
    - name: Organize firmware
      if: env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    # 12. 上传固件
    - name: Upload firmware directory
      uses: actions/upload-artifact@v4    # ✅ 使用最新 v4
      if: env.UPLOAD_FIRMWARE == 'true'
      with:
        name: OpenWrt_firmware
        path: ${{ env.FIRMWARE }}

    # 13. 生成 release tag（可选）
    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    # 14. 上传固件到 Release（可选）
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    # 15. 清理 workflow 历史
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 2

    # 16. 删除旧 Releases (使用 master 分支)
    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
